<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AI Movie Sentiment Analyzer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🎬 AI Movie Sentiment Analyzer</h1>

<p>Enter a movie review and let AI analyze its sentiment</p>

<form action="/predict" method="post">

<textarea name="review" placeholder="Write your movie review here..." required></textarea>

<button type="submit">Analyze Sentiment</button>

</form>

{% if prediction_text %}

<div class="result {{ sentiment }}">

<h2>{{ prediction_text }}</h2>

</div>

{% endif %}

</div>

</body>
</html>
